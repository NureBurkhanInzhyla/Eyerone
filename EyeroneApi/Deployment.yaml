apiVersion: apps/v1
kind: Deployment
metadata:
  name: eyerone-api-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: eyerone-api
  template:
    metadata:
      labels:
        app: eyerone-api
    spec:
      containers:
      - name: eyerone-api
        image: eyeroneapi:v4
        env:
        - name: ConnectionStrings__DefaultConnection
          value: "Host=host.docker.internal;Database=EyeroneDb;Username=postgres;Password=inginger4th"
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "256Mi"
            cpu: "400m" 
---
apiVersion: v1
kind: Service
metadata:
  name: eyerone-api-service  
spec:
  selector:
    app: eyerone-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
