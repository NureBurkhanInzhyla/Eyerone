apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
          - name: POSTGRES_PASSWORD
            value: "inginger4th"
          - name: POSTGRES_DB
            value: "EyeroneDb"  
          ports:
          - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db-service 
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432